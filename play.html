<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>質數遊戲 - 遊戲中</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/play.css">
</head>

<body>
  <div class="wrap">
    <h1 id="title">質數遊戲</h1>

    <div class="controls">
      <div class="controls-row">
        <button id="gen">開始新遊戲</button>
        <!-- <button id="pause">暫停</button> -->
        <button id="backHome">返回首頁</button>
      </div>
      <div class="controls-row auth-row">
        <span id="authStatus">連線中…</span>
        <button id="btnLinkGoogle" class="btn-link" style="display:none">Google 登入</button>
      </div>
    </div>

    <div class="hud">
      <div class="pill">下一個要填：<b id="nextN">—</b></div>
      <div class="pill">已填：<span id="progress">0</span>/<span id="total">0</span></div>
    </div>
    <div class="hud">
      <div class="pill">計時：<b id="clock">00:00.00</b></div>
      <div class="pill">取消次數：<b id="undoCount">0</b></div>
    </div>

    <div class="board-wrap">
      <div id="board" class="board"></div>
      <div id="overlay" class="overlay">
        <div id="overlayContent" class="modal"></div>
      </div>
    </div>

    <p id="status"></p>
    <footer>© 奧羅桌遊設計工作室 - Prime Game</footer>
  </div>

  <script src="assets/js/router.js"></script>
  <script>
    (() => {
      const q = Router.getQuery();
      const MODE = (q.mode || 'basic');
      const SIZE = parseInt(q.size || '7', 10);
      const PLAYER = (q.name || localStorage.getItem('playerName') || '玩家').slice(0, 10);
      const START = parseInt(q.start || '1', 10);
      const HIDDEN = q.hidden === '1' || q.hidden === 1;

      const statusEl = document.getElementById('status');
      const boardEl = document.getElementById('board');
      const overlayEl = document.getElementById('overlay');
      const overlayContent = document.getElementById('overlayContent');
      const nextNEl = document.getElementById('nextN');
      const progressEl = document.getElementById('progress');
      const totalEl = document.getElementById('total');
      const clockEl = document.getElementById('clock');
      const undoCountEl = document.getElementById('undoCount');
      const genBtn = document.getElementById('gen');
      const backHomeBtn = document.getElementById('backHome');

      const modeMap = { basic: '基本', hard: '困難', hidden: '隱藏' };
      const modeLabel = modeMap[MODE] || '自訂';
      document.getElementById('title').textContent = `質數遊戲-${modeLabel}${SIZE}階`;

      let R = SIZE, C = SIZE, startNum = START, hiddenMode = HIDDEN;
      let path = [], gridOrder = [];
      let isFixed = [], filled = [], assigned = [], stack = [];
      let current = 0, maxVal = 0, totalComposites = 0;
      let posOf = {};
      let inputLocked = true;
      let gameState = 'idle';
      let undoCount = 0, scoreSaved = false;
      let answerTimer = null;

      let tStart = 0, tId = null, running = false, elapsedBeforePause = 0;
      const fmt = (ms) => {
        const s = Math.floor(ms / 1000);
        const m = Math.floor(s / 60);
        const sec = s % 60;
        const hundredths = Math.floor((ms % 1000) / 10);
        return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}.${String(hundredths).padStart(2, '0')}`;
      };
      const startTimer = () => {
        tStart = performance.now();
        running = true;
        clearInterval(tId);
        tId = setInterval(() => {
          clockEl.textContent = fmt(elapsedBeforePause + (performance.now() - tStart));
        }, 10);
      };
      const stopTimer = () => {
        if (running) {
          elapsedBeforePause += performance.now() - tStart;
          running = false;
          clearInterval(tId);
          tId = null;
        }
        const finalMs = Math.floor(elapsedBeforePause / 10) * 10;
        elapsedBeforePause = finalMs;
        clockEl.textContent = fmt(finalMs);
        return finalMs;
      };
      const resetTimer = () => {
        clearInterval(tId);
        tId = null;
        running = false;
        elapsedBeforePause = 0;
        clockEl.textContent = fmt(0);
      };

      const isPrime = (n) => { if (n <= 1) return false; if (n === 2) return true; if (n % 2 === 0) return false; for (let i = 3; i * i <= n; i += 2) { if (n % i === 0) return false; } return true; };
      const isComposite = (n) => n > 1 && !isPrime(n);
      const nextComposite = (n) => { let k = n + 1; while (k <= maxVal && !isComposite(k)) k++; return k; };

      function initSnake(R, C) { const p = []; for (let r = 0; r < R; r++) { if (r % 2 === 0) { for (let c = 0; c < C; c++)p.push([r, c]); } else { for (let c = C - 1; c >= 0; c--)p.push([r, c]); } } return p; }
      function backbite(p, R, C) { const n = p.length; if (n < 4) return false; const useHead = Math.random() < 0.5; const endpoint = useHead ? p[0] : p[n - 1]; const idx = new Map(); for (let i = 0; i < n; i++)idx.set(p[i][0] + "," + p[i][1], i); const ds = [[1, 0], [-1, 0], [0, 1], [0, -1]]; const cand = []; for (const [dr, dc] of ds) { const nr = endpoint[0] + dr, nc = endpoint[1] + dc; if (nr < 0 || nr >= R || nc < 0 || nc >= C) continue; const key = nr + "," + nc; if (!idx.has(key)) continue; const k = idx.get(key); if (useHead) { if (k <= 1) continue; } else { if (k >= n - 2) continue; } cand.push(k); } if (!cand.length) return false; const k = cand[(Math.random() * cand.length) | 0]; if (useHead) { const pre = p.slice(0, k).reverse(); const rest = p.slice(k); p.splice(0, p.length, ...pre, ...rest); } else { const left = p.slice(0, k + 1); const tail = p.slice(k + 1).reverse(); p.splice(0, p.length, ...left, ...tail); } return true; }

      function buildBoard() {
        boardEl.style.gridTemplateColumns = `repeat(${C}, 1fr)`;
        boardEl.innerHTML = '';
        let highlightPrime = null;
        if (!hiddenMode) {
          for (let k = current + 1; k <= maxVal; k++) { if (isPrime(k)) { highlightPrime = k; break; } }
        }
        for (let r = 0; r < R; r++) {
          for (let c = 0; c < C; c++) {
            const v = gridOrder[r][c];
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.r = r; cell.dataset.c = c;
            if (v === startNum) {
              cell.classList.add('fixed', 'one');
              cell.textContent = String(v);
            } else if (filled[r][c]) {
              const val = assigned[r][c];
              if (isPrime(val)) cell.classList.add('prime');
              else cell.classList.add('filled');
              cell.textContent = String(val);
            } else if (isPrime(v)) {
              cell.classList.add('prime');
              if (!hiddenMode) {
                cell.classList.add('fixed');
                cell.textContent = String(v);
                if (v === highlightPrime) cell.classList.add('next-prime-highlight');
              } else {
                cell.textContent = '';
              }
            }
            boardEl.appendChild(cell);
          }
        }
      }

      function updateHUD() {
        nextNEl.textContent = current ? String(current) : '—';
        progressEl.textContent = String(stack.length);
        totalEl.textContent = String(totalComposites);
        undoCountEl.textContent = String(undoCount);
        buildBoard();
      }

      function resetState() {
        isFixed = Array.from({ length: R }, () => Array(C).fill(false));
        filled = Array.from({ length: R }, () => Array(C).fill(false));
        assigned = Array.from({ length: R }, () => Array(C).fill(0));
        stack = []; posOf = {}; undoCount = 0;
        for (let r = 0; r < R; r++) {
          for (let c = 0; c < C; c++) {
            const v = gridOrder[r][c];
            if (hiddenMode) {
              if (v === startNum) { isFixed[r][c] = true; posOf[v] = [r, c]; }
            } else {
              if (v === startNum || isPrime(v)) { isFixed[r][c] = true; posOf[v] = [r, c]; }
            }
          }
        }
        maxVal = startNum + R * C - 1;
        if (hiddenMode) {
          totalComposites = R * C - 1;
          current = startNum + 1;
        } else {
          totalComposites = 0;
          for (let k = startNum + 1; k <= maxVal; k++) if (isComposite(k)) totalComposites++;
          current = nextComposite(startNum);
        }
        updateHUD();
      }

      function showOverlay(html, extraClass = '') {
        overlayContent.className = 'modal';
        if (extraClass) overlayContent.classList.add(extraClass);
        overlayContent.innerHTML = html;
        overlayEl.classList.add('show');
        inputLocked = true;
      }
      function hideOverlay() { overlayEl.classList.remove('show'); overlayContent.innerHTML = ''; }

      function showStartOverlay() {
        gameState = 'ready';
        const rule = hiddenMode
          ? '隱藏模式：依序填入 <b>所有數字</b>（包含質數）。每一步必須貼著前一數字。<b>當前要填是質數→只能點質數格；是合成數→只能點合成數格</b>。'
          : '一般模式：依序填入 <b>合成數</b>，每一步必須貼著前一數字；若下一個數字是質數，也要同時貼著該質數。';
        showOverlay(`
      <h2>開始遊戲</h2>
      <p>${rule}</p>
      <div class="row"><button id="btnStart" class="wide">點擊開始</button></div>
    `);
        document.getElementById('btnStart').onclick = () => startCountdown();
      }

      function startCountdown() {
        gameState = 'countdown';
        let n = 3;
        showOverlay(`<div class="big" id="cdNum">${n}</div><p>準備囉…</p>`);
        const cdNum = document.getElementById('cdNum');
        const tick = setInterval(() => {
          n--; if (n > 0) { cdNum.textContent = String(n); } else {
            clearInterval(tick); hideOverlay(); inputLocked = false; gameState = 'running'; resetTimer(); startTimer();
          }
        }, 1000);
      }

      function showSuccess() {
        if (scoreSaved) return;
        scoreSaved = true;
        gameState = 'finished';
        const totalMsRounded = stopTimer();
        const pauseBtn = document.getElementById('pause');
        if (pauseBtn) pauseBtn.disabled = true;
        const time = fmt(totalMsRounded);
        showOverlay(`
      <h2>成功完成！</h2>
      <p>模式：<b>${modeLabel}${SIZE}階</b>　玩家：<b>${PLAYER}</b></p>
      <p>用時：<b>${time}</b>　取消：<b>${undoCount}</b> 次</p>
      <div id="resultArea" class="result-area"><p class="result-pending">計算排名中…</p></div>
      <div class="row">
        <button id="btnAgain">再挑戰一次</button>
        <button id="btnHome">返回首頁</button>
        <button id="btnLB" class="wide">查看排行榜</button>
      </div>
    `, 'success');
        document.getElementById('btnAgain').onclick = () => { hideOverlay(); generate(); };
        document.getElementById('btnHome').onclick = () => { location.href = 'index.html'; };
        document.getElementById('btnLB').onclick = () => { location.href = `leaderboard.html?mode=${MODE}&size=${SIZE}`; };
        if (window.saveScoreAndRank) {
          window.saveScoreAndRank({
            mode: MODE, size: SIZE, name: PLAYER,
            ms: totalMsRounded, undos: undoCount,
            onResult: ({ rank, rankPending, rankFailed, beatTime, beatUndo, prevTimeMs, prevUndos }) => {
              const area = document.getElementById('resultArea');
              if (!area) return;
              const rankLabel = rankPending ? '計算中...' : (rankFailed ? '暫時無法計算' : (rank !== null ? `第 ${rank} 名` : '暫時無法計算'));
              let html = `<p>本次速度排名：<b>${rankLabel}</b></p>`;
              if (beatTime) {
                const prev = prevTimeMs != null ? `原 ${fmt(prevTimeMs)}` : '首次紀錄';
                html += `<p class="record-new">✓ 最佳時間！（${prev}）</p>`;
              } else if (prevTimeMs != null) {
                html += `<p class="record-old">個人最佳時間：${fmt(prevTimeMs)}</p>`;
              }
              if (beatUndo) {
                const prev = prevUndos != null ? `原 ${prevUndos} 次` : '首次紀錄';
                html += `<p class="record-new">✓ 最少取消！（${prev}）</p>`;
              } else if (prevUndos != null) {
                html += `<p class="record-old">個人最少取消：${prevUndos} 次</p>`;
              }
              area.innerHTML = html;
            }
          }).catch(err => {
            const area = document.getElementById('resultArea');
            if (area) area.innerHTML = '<p class="result-pending">—（排名計算失敗）</p>';
            console.error(err);
          });
        }
      }

      function tryShake(el) { el.classList.add('wrong'); setTimeout(() => el.classList.remove('wrong'), 220); }

      function generate() {
        try {
          resetTimer(); inputLocked = true; gameState = 'idle';
          undoCount = 0; undoCountEl.textContent = '0'; scoreSaved = false;
          if (answerTimer) { clearInterval(answerTimer); answerTimer = null; }
          path = initSnake(R, C);
          if (Math.random() < 0.5) path.reverse();
          const iters = Math.max(1, 20 * R * C);
          for (let i = 0; i < iters; i++) backbite(path, R, C);
          gridOrder = Array.from({ length: R }, () => Array(C).fill(0));
          path.forEach((pt, i) => { gridOrder[pt[0]][pt[1]] = startNum + i; });
          resetState();
          statusEl.className = '';
          showStartOverlay();
        } catch (err) { statusEl.className = 'err'; statusEl.textContent = 'Error: ' + err.message; }
      }

      boardEl.addEventListener('click', (e) => {
        const cell = e.target.closest('.cell'); if (!cell) return;
        if (inputLocked) return;
        if (gameState !== 'running') return;
        const r = +cell.dataset.r, c = +cell.dataset.c;
        const v = gridOrder[r][c];
        if (isFixed[r][c]) return;
        if (filled[r][c]) {
          const idx = stack.findIndex(([rr, cc]) => rr === r && cc === c);
          if (idx !== -1) {
            for (let i = stack.length - 1; i >= idx; i--) {
              const [rr, cc] = stack[i];
              const delVal = assigned[rr][cc];
              filled[rr][cc] = false; assigned[rr][cc] = 0; delete posOf[delVal];
            }
            stack = stack.slice(0, idx);
            undoCount++; undoCountEl.textContent = String(undoCount);
            let last = startNum;
            if (stack.length) { const [lr, lc] = stack[stack.length - 1]; last = assigned[lr][lc]; }
            current = hiddenMode ? (last + 1) : nextComposite(last);
            updateHUD();
          }
          return;
        }
        if (hiddenMode) {
          const needPrime = isPrime(current);
          const targetPrime = isPrime(v);
          if (needPrime !== targetPrime) { tryShake(cell); return; }
        }
        if (current > maxVal) return;
        const prev = current - 1; const prevPos = posOf[prev]; if (!prevPos) { tryShake(cell); return; }
        const adjPrev = (Math.abs(prevPos[0] - r) + Math.abs(prevPos[1] - c) === 1); if (!adjPrev) { tryShake(cell); return; }
        if (!hiddenMode) {
          const nxt = current + 1;
          if (nxt <= maxVal && isPrime(nxt)) {
            const nxtPos = posOf[nxt];
            const adjNext = nxtPos && (Math.abs(nxtPos[0] - r) + Math.abs(nxtPos[1] - c) === 1);
            if (!adjNext) { tryShake(cell); return; }
          }
        }
        filled[r][c] = true;
        assigned[r][c] = current;
        stack.push([r, c]);
        posOf[current] = [r, c];
        const domCell = boardEl.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
        if (domCell) {
          domCell.textContent = String(current);
          if (isPrime(current)) {
            domCell.classList.remove('filled');
            domCell.classList.add('prime');
          } else {
            domCell.classList.add('filled');
          }
          if (current === startNum) domCell.classList.add('one');
        }
        current = hiddenMode ? (current + 1) : nextComposite(current);
        updateHUD();
        if (stack.length === totalComposites) {
          stopTimer();
          inputLocked = true;
          statusEl.textContent = '挑戰成功！正在回顧路徑...';
          const pauseBtn = document.getElementById('pause');
          if (pauseBtn) pauseBtn.disabled = true;
          for (let r = 0; r < R; r++) {
            for (let c = 0; c < C; c++) {
              if (!isFixed[r][c]) {
                filled[r][c] = false;
                assigned[r][c] = 0;
              }
            }
          }
          updateHUD();
          let k = 0;
          const allCells = [];
          for (let r = 0; r < R; r++) {
            for (let c = 0; c < C; c++) allCells.push({ r, c, val: gridOrder[r][c] });
          }
          allCells.sort((a, b) => a.val - b.val);
          answerTimer = setInterval(() => {
            if (k < allCells.length) {
              const { r, c, val } = allCells[k];
              filled[r][c] = true;
              assigned[r][c] = val;
              k++;
              updateHUD();
            } else {
              clearInterval(answerTimer);
              answerTimer = null;
              showSuccess();
            }
          }, 30);
        }
      });

      genBtn.onclick = generate;
      backHomeBtn.onclick = () => { location.href = 'index.html'; };
      generate();
    })();
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
    import {
      getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged,
      setPersistence, browserLocalPersistence
    } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";
    import {
      getFirestore, doc, getDoc, setDoc, serverTimestamp,
      collection, getDocs, query, where, getCountFromServer
    } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAbd97s2tRaR_VJXrBXGlibhMlSTujSl5w",
      authDomain: "prime-game-58db3.firebaseapp.com",
      projectId: "prime-game-58db3",
      storageBucket: "prime-game-58db3.firebasestorage.app",
      messagingSenderId: "1056693585850",
      appId: "1:1056693585850:web:a17b5e82a12fa6525bff83"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const gp = new GoogleAuthProvider();
    let currentUser = null;

    function updateAuthUI(user) {
      const st = document.getElementById('authStatus');
      const lb = document.getElementById('btnLinkGoogle');
      if (!st) return;
      if (!user || user.isAnonymous) {
        st.textContent = '尚未登入';
        if (lb) lb.style.display = '';
      } else {
        const email = user.email || user.providerData[0]?.email || 'Google 帳號';
        st.textContent = email;
        if (lb) lb.style.display = 'none';
      }
    }

    setPersistence(auth, browserLocalPersistence).catch(e => {
      console.error('登入保存設定失敗', e);
    }).finally(() => {
      onAuthStateChanged(auth, user => {
        currentUser = user || null;
        updateAuthUI(currentUser);
        if (!currentUser || currentUser.isAnonymous) {
          alert('請先使用 Google 登入才能遊玩。');
          location.href = 'index.html';
        }
      });
    });

    document.getElementById('btnLinkGoogle')?.addEventListener('click', async () => {
      try {
        const result = await signInWithPopup(auth, gp);
        currentUser = result.user;
        updateAuthUI(currentUser);
      } catch (e) {
        if (e.code !== 'auth/popup-closed-by-user') {
          console.error('Google 登入失敗', e);
        }
      }
    });

    function ensureAuth() {
      if (currentUser && !currentUser.isAnonymous) return Promise.resolve(currentUser);
      return new Promise((resolve, reject) => {
        const t = setTimeout(() => reject(new Error('auth timeout')), 10000);
        const unsub = onAuthStateChanged(auth, user => {
          if (user && !user.isAnonymous) { clearTimeout(t); unsub(); resolve(user); }
        });
      });
    }

    function timestampMs(value) {
      if (!value) return 0;
      if (typeof value.toMillis === 'function') return value.toMillis();
      if (typeof value.toDate === 'function') return value.toDate().getTime();
      return Number(value) || 0;
    }

    function compareTimeRows(a, b) {
      return (a.ms - b.ms) || ((a.undos || 0) - (b.undos || 0)) || (timestampMs(a.updatedAt || a.createdAt) - timestampMs(b.updatedAt || b.createdAt));
    }

    function withTimeout(promise, ms, message) {
      return Promise.race([
        promise,
        new Promise((_, reject) => setTimeout(() => reject(new Error(message)), ms))
      ]);
    }

    async function countRows(constraints) {
      const snap = await getCountFromServer(query(collection(db, 'scores'), ...constraints));
      return snap.data().count || 0;
    }

    async function calculateCurrentTimeRank({ mode, size, ms, undos }) {
      const base = [
        where('mode', '==', mode),
        where('size', '==', Number(size)),
        where('kind', '==', 'time')
      ];
      const [betterByTime, betterByUndo] = await Promise.all([
        countRows([...base, where('ms', '<', Number(ms))]),
        countRows([
          ...base,
          where('ms', '==', Number(ms)),
          where('undos', '<', Number(undos))
        ])
      ]);
      return betterByTime + betterByUndo + 1;
    }

    async function calculateTimeRankFallback({ mode, size, ms, undos }) {
      const snap = await getDocs(collection(db, 'scores'));
      const rows = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(row => row.mode === mode && Number(row.size) === Number(size) && row.kind === 'time')
        .sort(compareTimeRows);
      const better = rows.filter(row =>
        Number(row.ms) < Number(ms)
        || (Number(row.ms) === Number(ms) && Number(row.undos || 0) < Number(undos))
      ).length;
      return better + 1;
    }

    async function calculateTimeRank({ mode, size, ms, undos }) {
      try {
        return await withTimeout(
          calculateCurrentTimeRank({ mode, size, ms, undos }),
          4500,
          'rank count timeout'
        );
      } catch (err) {
        console.warn('Rank count fallback', err);
        return withTimeout(
          calculateTimeRankFallback({ mode, size, ms, undos }),
          9000,
          'rank fallback timeout'
        );
      }
    }

    async function saveScoreAndRank({ mode, size, name, ms, undos, onResult }) {
      const user = await ensureAuth();
      const uid = user.uid;
      const timeId = `${uid}__${mode}__${size}__time`;
      const undoId = `${uid}__${mode}__${size}__undo`;

      const [timeSnap, undoSnap] = await Promise.all([
        getDoc(doc(db, 'scores', timeId)),
        getDoc(doc(db, 'scores', undoId))
      ]);
      const prevTime = timeSnap.exists() ? timeSnap.data() : null;
      const prevUndo = undoSnap.exists() ? undoSnap.data() : null;

      const beatTime = !prevTime
        || ms < prevTime.ms
        || (ms === prevTime.ms && undos < prevTime.undos);
      const beatUndo = !prevUndo
        || undos < prevUndo.undos
        || (undos === prevUndo.undos && ms < prevUndo.ms);

      const record = { uid, name, mode, size: Number(size), ms: Number(ms), undos: Number(undos), updatedAt: serverTimestamp() };
      const writes = [];
      if (beatTime) writes.push(setDoc(doc(db, 'scores', timeId), { ...record, kind: 'time' }));
      if (beatUndo) writes.push(setDoc(doc(db, 'scores', undoId), { ...record, kind: 'undo' }));
      await Promise.all(writes);

      const resultBase = {
        beatTime,
        beatUndo,
        prevTimeMs: prevTime?.ms ?? null,
        prevUndos: prevUndo?.undos ?? null,
      };
      if (typeof onResult === 'function') {
        onResult({
          ...resultBase,
          rank: null,
          rankPending: true,
          rankFailed: false,
        });
      }

      let rank = null;
      let rankFailed = false;
      try {
        rank = await calculateTimeRank({ mode, size, ms, undos });
      } catch (err) {
        rankFailed = true;
        console.error('Rank calculation failed', err);
      }

      if (typeof onResult === 'function') {
        onResult({
          ...resultBase,
          rank,
          rankPending: false,
          rankFailed,
        });
      }
    }

    window.saveScoreAndRank = saveScoreAndRank;
  </script>
