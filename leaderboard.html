<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>質數遊戲 - 排行榜</title>
<style>
  :root{
    --brand:#ffbf48;
    --bg:#f6efe1;
    --ink:#222;
    --muted:#666;
    --card:#fff;
    --stroke:#e8dfc7;
    --pill:#fff8e6;
    --gold:#f5c542; --silver:#c0c7cf; --bronze:#d59a6a;
    --maxw:960px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,Segoe UI,Roboto,Noto Sans,"PingFang TC","Microsoft JhengHei",sans-serif}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:16px;padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right));padding-bottom:max(16px,env(safe-area-inset-bottom))}
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
  h1{font-size:20px;margin:0}
  .btn{appearance:none;border:0;background:var(--brand);color:#000;padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:600}
  .btn.secondary{background:#fff;border:1px solid var(--stroke)}
  .btn:disabled{opacity:.55;cursor:not-allowed}
  .btn:active{transform:translateY(1px)}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:5;background:var(--bg);padding:8px 0}
  .tabgroup{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .tabgroup .label{font-size:14px;color:var(--muted);margin-right:4px}
  .seg{display:flex;background:#fff;border:1px solid var(--stroke);border-radius:12px;overflow:hidden}
  .seg button{padding:8px 12px;border:0;background:transparent;cursor:pointer;font-weight:600}
  .seg button.active{background:var(--brand)}
  .cards{margin-top:12px;display:grid;grid-template-columns:1fr;gap:10px}
  @media (min-width:700px){ .cards{grid-template-columns:1fr 1fr} }
  .card{background:var(--card);border:1px solid var(--stroke);border-radius:12px;padding:12px 14px;display:grid;grid-template-columns:48px minmax(0,1fr);gap:10px 12px;align-items:center;min-height:104px}
  .rank{width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;flex:0 0 auto;background:#eee;border:1px solid var(--stroke)}
  .rank.r1{background:var(--gold)}
  .rank.r2{background:var(--silver)}
  .rank.r3{background:var(--bronze)}
  .meta{min-width:0;display:flex;flex-direction:column;gap:7px}
  .titleRow{display:grid;grid-template-columns:minmax(0,1fr) auto;grid-template-areas:"name id" "kpi kpi";gap:6px 8px;align-items:center;min-width:0}
  .name{grid-area:name;font-weight:800;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;max-width:100%}
  .playerId{grid-area:id;display:inline-flex;align-items:center;justify-self:end;border:1px solid #dbe6e1;background:#eef8f4;color:#0f766e;border-radius:999px;padding:1px 6px;font-size:10px;font-weight:800;white-space:nowrap}
  .pair{grid-area:kpi;display:flex;flex-direction:row;gap:8px;align-items:center;justify-content:flex-start;min-width:0}
  .kpi{display:inline-flex;gap:6px;align-items:center;justify-content:center;background:var(--pill);padding:5px 9px;border:1px solid var(--stroke);border-radius:999px;font-size:12px;font-weight:800;white-space:nowrap}
  .kpi span:first-child{color:#111827}
  .sub{color:var(--muted);font-size:12px;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  @media (max-width:420px){
    .wrap{padding-left:8px;padding-right:8px}
    .card{grid-template-columns:44px minmax(0,1fr);gap:8px;padding:12px}
    .titleRow{grid-template-columns:minmax(0,1fr) auto;gap:6px}
    .rank{width:42px;height:42px}
    .kpi{padding:5px 8px;font-size:12px}
    .playerId{padding:1px 5px;font-size:10px}
  }
  .footerBar{display:flex;gap:10px;justify-content:center;margin:16px 0}
  .empty{padding:24px;text-align:center;color:var(--muted);grid-column:1/-1}
  .hint{font-size:12px;color:var(--muted);text-align:center;margin-top:4px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>質數遊戲排行榜</h1>
    <div>
      <button class="btn secondary" id="btnHome">返回首頁</button>
      <button class="btn" id="btnPlay">前往挑戰</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tabgroup" id="modeTabs">
      <span class="label">模式</span>
      <div class="seg">
        <button data-mode="basic">基本</button>
        <button data-mode="hard">困難</button>
        <button data-mode="hidden">隱藏</button>
      </div>
    </div>

    <div class="tabgroup" id="sizeTabs">
      <span class="label">尺寸</span>
      <div class="seg">
        <button data-size="5">5階</button>
        <button data-size="7">7階</button>
        <button data-size="10">10階</button>
      </div>
    </div>

    <div class="tabgroup" id="lbTabs">
      <span class="label">排行榜</span>
      <div class="seg">
        <button data-lb="time">最短時間</button>
        <button data-lb="undo">最少取消</button>
      </div>
    </div>
  </div>

  <div id="cards" class="cards"></div>
  <div class="hint">每位玩家僅保留一筆最短時間與一筆最少取消紀錄。<br>平手時依序比較 <code>用時</code> → <code>取消次數</code> → <code>較早達成</code></div>

  <div class="footerBar">
    <button class="btn secondary" id="btnMore">載入更多</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
  getFirestore, collection, getDocs, query, where, orderBy, limit, startAfter
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAbd97s2tRaR_VJXrBXGlibhMlSTujSl5w",
  authDomain: "prime-game-58db3.firebaseapp.com",
  projectId: "prime-game-58db3",
  storageBucket: "prime-game-58db3.firebasestorage.app",
  messagingSenderId: "1056693585850",
  appId: "1:1056693585850:web:a17b5e82a12fa6525bff83",
  measurementId: "G-0ZLPR7N4FB"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const $ = (s)=>document.querySelector(s);
const $$ = (s)=>Array.from(document.querySelectorAll(s));

const modeLabel = (m)=> m==='basic'?'基本':(m==='hard'?'困難':'隱藏');

const url = new URL(location.href);
const initState = {
  mode: url.searchParams.get('mode') || 'basic',
  size: +(url.searchParams.get('size') || 5),
  lb: url.searchParams.get('lb') || 'time',
  pageSize: 50
};

let state = {
  ...initState,
  lastDoc: null,
  loadedCount: 0,
  loading: false,
  done: false
};

function setActive(containerSel, attr, val){
  $$(containerSel + ' .seg button').forEach(b=>{
    b.classList.toggle('active', b.dataset[attr] == val);
  });
}
function fmtMs(ms){
  const value = Number(ms || 0);
  const s = Math.floor(value/1000), m=Math.floor(s/60), sec=s%60, hundredths=Math.floor((value%1000)/10);
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}.${String(hundredths).padStart(2,'0')}`;
}
function paramsToPlay(mode,size){
  if (mode==='basic') return `play.html?mode=basic&size=${size}&start=1`;
  if (mode==='hard') return `play.html?mode=hard&size=${size}&start=105`;
  return `play.html?mode=hidden&size=${size}&start=1&hidden=1`;
}
function escapeHtml(value){
  return String(value ?? '').replace(/[&<>"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[ch]));
}
function shortPlayerId(row){
  const raw = String(row.uid || row.id || '');
  if (!raw) return '----';
  let hash = 0;
  for (let i = 0; i < raw.length; i++) {
    hash = ((hash << 5) - hash + raw.charCodeAt(i)) >>> 0;
  }
  return hash.toString(16).slice(-4).toUpperCase().padStart(4, '0');
}
// 以伺服器端查詢 + 排序 + 游標分頁，每頁只讀 pageSize 筆（不再整表下載）。
// time 榜：依 ms→undos→達成時間 排序（索引 mode,size,kind,ms,undos,updatedAt）
// undo 榜：依 undos→ms→達成時間 排序（索引 mode,size,kind,undos,ms,updatedAt）
function buildPageQuery(){
  const filters = [
    where('mode', '==', state.mode),
    where('size', '==', Number(state.size)),
    where('kind', '==', state.lb)
  ];
  const order = state.lb === 'time'
    ? [orderBy('ms', 'asc'), orderBy('undos', 'asc'), orderBy('updatedAt', 'asc')]
    : [orderBy('undos', 'asc'), orderBy('ms', 'asc'), orderBy('updatedAt', 'asc')];
  const parts = [...filters, ...order];
  if (state.lastDoc) parts.push(startAfter(state.lastDoc));
  parts.push(limit(state.pageSize));
  return query(collection(db, 'scores'), ...parts);
}

async function loadNextPage(){
  if (state.loading || state.done) return;
  state.loading = true;
  $('#btnMore').disabled = true;

  try{
    const snap = await getDocs(buildPageQuery());

    if (snap.empty) {
      state.done = true;
      if ($('#cards').children.length === 0) {
        $('#cards').innerHTML = `<div class="empty">目前沒有排行榜資料</div>`;
      }
    } else {
      const rows = snap.docs.map((d, i) => ({
        id: d.id, ...d.data(), rank: state.loadedCount + i + 1
      }));
      renderCards(rows);
      state.lastDoc = snap.docs[snap.docs.length - 1];
      state.loadedCount += snap.docs.length;
      if (snap.docs.length < state.pageSize) state.done = true;
    }
  }catch(err){
    console.error('讀取排行榜失敗：', err);
    if ($('#cards').children.length===0){
      $('#cards').innerHTML = `<div class="empty">讀取失敗，請稍後再試</div>`;
    }
    state.done = true;
  }finally{
    state.loading = false;
    $('#btnMore').disabled = state.done;
    $('#btnMore').textContent = state.done ? '沒有更多了' : '載入更多';
  }
}

function renderCards(list){
  const frag = document.createDocumentFragment();
  list.forEach(row=>{
    const div = document.createElement('div');
    div.className = 'card';
    const rClass = row.rank===1?'r1':row.rank===2?'r2':row.rank===3?'r3':'';
    const tsValue = row.updatedAt || row.createdAt;
    const ts = tsValue?.toDate?.();
    const playerId = shortPlayerId(row);
    div.innerHTML = `
      <div class="rank ${rClass}">${row.rank}</div>
      <div class="meta">
        <div class="titleRow">
          <div class="name">${escapeHtml(row.name || '玩家')}</div>
          <div class="playerId">#${playerId}</div>
          <div class="pair">
            <div class="kpi"><span>時間</span><span>${fmtMs(row.ms)}</span></div>
            <div class="kpi"><span>取消</span><span>${row.undos ?? 0}</span></div>
          </div>
        </div>
        <div class="sub">${modeLabel(state.mode)}・${state.size}階　|　${ts ? ts.toLocaleString() : ''}</div>
      </div>
    `;
    frag.appendChild(div);
  });
  $('#cards').appendChild(frag);
}
function resetAndLoad(){
  $('#cards').innerHTML = '';
  state.lastDoc = null;
  state.loadedCount = 0;
  state.done = false;
  $('#btnMore').disabled = false;
  $('#btnMore').textContent = '載入更多';
  setActive('#modeTabs','mode',state.mode);
  setActive('#sizeTabs','size',state.size);
  setActive('#lbTabs','lb',state.lb);
  const u = new URL(location.href);
  u.searchParams.set('mode',state.mode);
  u.searchParams.set('size',String(state.size));
  u.searchParams.set('lb',state.lb);
  history.replaceState(null,'',u.toString());
  loadNextPage();
}

$('#modeTabs .seg').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  state.mode = b.dataset.mode;
  resetAndLoad();
});
$('#sizeTabs .seg').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  state.size = +b.dataset.size;
  resetAndLoad();
});
$('#lbTabs .seg').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  state.lb = b.dataset.lb;
  resetAndLoad();
});
$('#btnMore').addEventListener('click', loadNextPage);
$('#btnHome').addEventListener('click', ()=> location.href='index.html');
$('#btnPlay').addEventListener('click', ()=> location.href = paramsToPlay(state.mode,state.size));

// scores 為公開讀取，瀏覽排行榜不需登入
setActive('#modeTabs','mode',state.mode);
setActive('#sizeTabs','size',state.size);
setActive('#lbTabs','lb',state.lb);
resetAndLoad();
</script>
</body>
</html>
