<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>質數遊戲-急速模式(Beta)</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/play.css">
  <style>
    /* 急速模式專屬（base.css / play.css 未涵蓋的部分） */
    .beta {
      font-size: 13px;
      font-weight: 800;
      color: #fff;
      background: #6d28d9;
      border-radius: 999px;
      padding: 2px 9px;
      vertical-align: middle;
    }

    .pill.time {
      background: #e6f7ff;
      border-color: #8bd3f7;
    }

    .pill.time.low {
      background: #ffe3e3;
      border-color: #ffb3b3;
      color: #b00020;
    }

    /* 阻擋格（play.css 沒有，沿用自由模式的深灰樣式） */
    .cell.blocked {
      --cell-bg: #4b5563;
      --cell-border: #374151;
      --cell-color: #4b5563;
      cursor: default;
      box-shadow: none;
    }

    .modal .done-count {
      font-size: 30px;
      font-weight: 900;
      color: #172033;
      margin: 6px 0;
    }

    .modal .stat b { color: #4b2faf; }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>急速模式 <span class="beta">Beta</span></h1>

    <div class="controls">
      <div class="controls-row">
        <button id="gen">開始新遊戲</button>
        <button id="backHome">返回首頁</button>
      </div>
    </div>

    <div class="hud">
      <div class="pill time" id="timePill">剩餘：<b id="timeLeft">30.0</b>s</div>
      <div class="pill">第 <b id="levelNum">1</b> 關</div>
      <div class="pill">進度：<span id="progress">0</span>/17</div>
    </div>

    <div class="board-wrap">
      <div id="board" class="board"></div>
      <div id="overlay" class="overlay">
        <div id="overlayContent" class="modal"></div>
      </div>
    </div>

    <p id="status"></p>
    <footer>© 奧羅桌遊設計工作室 - Prime Game</footer>
  </div>

  <script>
    (() => {
      // ---- DOM ----
      const boardEl = document.getElementById('board');
      const overlayEl = document.getElementById('overlay');
      const overlayContent = document.getElementById('overlayContent');
      const timeLeftEl = document.getElementById('timeLeft');
      const timePill = document.getElementById('timePill');
      const levelNumEl = document.getElementById('levelNum');
      const progressEl = document.getElementById('progress');
      const statusEl = document.getElementById('status');

      // ---- 固定規格 ----
      const R = 6, C = 5;            // 高 6 × 寬 5 = 30 格
      const TOTAL_MS = 30000;        // 30 秒倒數
      const TARGET_COMPOSITES = 17;  // 每關要點的合數固定 17

      // ---- 狀態 ----
      let startNum = 1;
      let path = [], gridOrder = [], blocked = [];
      let isFixed = [], filled = [], assigned = [], stack = [];
      let posOf = {};
      let current = 0, maxVal = 0, totalComposites = 0;
      let inputLocked = true;
      let running = false;
      let levelCount = 0;
      let deadline = 0, timerId = null, cdId = null;

      // ---- 數學 ----
      const isPrime = (n) => { if (n <= 1) return false; if (n === 2) return true; if (n % 2 === 0) return false; for (let i = 3; i * i <= n; i += 2) { if (n % i === 0) return false; } return true; };
      const isComposite = (n) => n > 1 && !isPrime(n);
      const nextComposite = (n) => { let k = n + 1; while (k <= maxVal && !isComposite(k)) k++; return k; };

      // ---- 漢米爾頓路徑（Backbite）----
      function initSnake(R, C) { const p = []; for (let r = 0; r < R; r++) { if (r % 2 === 0) { for (let c = 0; c < C; c++)p.push([r, c]); } else { for (let c = C - 1; c >= 0; c--)p.push([r, c]); } } return p; }
      function backbite(p, R, C) { const n = p.length; if (n < 4) return false; const useHead = Math.random() < 0.5; const endpoint = useHead ? p[0] : p[n - 1]; const idx = new Map(); for (let i = 0; i < n; i++)idx.set(p[i][0] + "," + p[i][1], i); const ds = [[1, 0], [-1, 0], [0, 1], [0, -1]]; const cand = []; for (const [dr, dc] of ds) { const nr = endpoint[0] + dr, nc = endpoint[1] + dc; if (nr < 0 || nr >= R || nc < 0 || nc >= C) continue; const key = nr + "," + nc; if (!idx.has(key)) continue; const k = idx.get(key); if (useHead) { if (k <= 1) continue; } else { if (k >= n - 2) continue; } cand.push(k); } if (!cand.length) return false; const k = cand[(Math.random() * cand.length) | 0]; if (useHead) { const pre = p.slice(0, k).reverse(); const rest = p.slice(k); p.splice(0, p.length, ...pre, ...rest); } else { const left = p.slice(0, k + 1); const tail = p.slice(k + 1).reverse(); p.splice(0, p.length, ...left, ...tail); } return true; }

      // 找出可玩格數 p，使 (startNum, startNum+p-1] 內合數剛好 = 17
      function playableForTarget(start) {
        let count = 0;
        for (let p = 2; p <= R * C; p++) {
          if (isComposite(start + p - 1)) count++;
          if (count === TARGET_COMPOSITES) return p;
        }
        return R * C; // 理論上不會用到（30 格範圍內合數必 ≥ 17）
      }

      function buildBoard() {
        boardEl.style.gridTemplateColumns = `repeat(${C}, 1fr)`;
        boardEl.innerHTML = '';
        let highlightPrime = null;
        for (let k = current + 1; k <= maxVal; k++) { if (isPrime(k)) { highlightPrime = k; break; } }
        for (let r = 0; r < R; r++) {
          for (let c = 0; c < C; c++) {
            const v = gridOrder[r][c];
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.r = r; cell.dataset.c = c;
            if (blocked[r][c]) { cell.classList.add('blocked'); boardEl.appendChild(cell); continue; }
            if (v === startNum) {
              cell.classList.add('fixed', 'one'); cell.textContent = String(v);
            } else if (filled[r][c]) {
              const val = assigned[r][c];
              if (isPrime(val)) cell.classList.add('prime'); else cell.classList.add('filled');
              cell.textContent = String(val);
            } else if (isPrime(v)) {
              cell.classList.add('prime', 'fixed'); cell.textContent = String(v);
              if (v === highlightPrime) cell.classList.add('next-prime-highlight');
            }
            boardEl.appendChild(cell);
          }
        }
      }

      function updateHUD() {
        levelNumEl.textContent = String(levelCount + 1);
        progressEl.textContent = String(stack.length);
        buildBoard();
      }

      function newLevel() {
        startNum = 1 + Math.floor(Math.random() * 105); // 1~105
        const p = playableForTarget(startNum);
        const K = R * C - p;

        // 生成完整路徑 + peel-and-shuffle 削掉 K 個端點（保證有解）
        path = initSnake(R, C);
        if (Math.random() < 0.5) path.reverse();
        const iters = Math.max(1, 20 * R * C);
        for (let i = 0; i < iters; i++) backbite(path, R, C);
        blocked = Array.from({ length: R }, () => Array(C).fill(false));
        const SHUFFLE = 6;
        for (let n = 0; n < K; n++) {
          for (let s = 0; s < SHUFFLE; s++) backbite(path, R, C);
          const cell = (Math.random() < 0.5) ? path.shift() : path.pop();
          blocked[cell[0]][cell[1]] = true;
        }
        gridOrder = Array.from({ length: R }, () => Array(C).fill(0));
        path.forEach((pt, i) => { gridOrder[pt[0]][pt[1]] = startNum + i; });

        // 重設此關狀態
        isFixed = Array.from({ length: R }, () => Array(C).fill(false));
        filled = Array.from({ length: R }, () => Array(C).fill(false));
        assigned = Array.from({ length: R }, () => Array(C).fill(0));
        posOf = {}; stack = [];
        for (let r = 0; r < R; r++) for (let c = 0; c < C; c++) {
          const v = gridOrder[r][c];
          if (!blocked[r][c] && (v === startNum || isPrime(v))) { isFixed[r][c] = true; posOf[v] = [r, c]; }
        }
        maxVal = startNum + p - 1;
        totalComposites = 0;
        for (let k = startNum + 1; k <= maxVal; k++) if (isComposite(k)) totalComposites++;
        current = nextComposite(startNum);
        updateHUD();
      }

      function tryShake(el) { el.classList.add('wrong'); setTimeout(() => el.classList.remove('wrong'), 220); }

      // ---- 點擊填格 / 悔棋 ----
      boardEl.addEventListener('click', (e) => {
        if (inputLocked || !running) return;
        const cell = e.target.closest('.cell'); if (!cell) return;
        const r = +cell.dataset.r, c = +cell.dataset.c;
        if (blocked[r][c] || isFixed[r][c]) return;

        if (filled[r][c]) { // 悔棋：撤回此格及其後
          const idx = stack.findIndex(([rr, cc]) => rr === r && cc === c);
          if (idx !== -1) {
            for (let i = stack.length - 1; i >= idx; i--) {
              const [rr, cc] = stack[i];
              const delVal = assigned[rr][cc];
              filled[rr][cc] = false; assigned[rr][cc] = 0; delete posOf[delVal];
            }
            stack = stack.slice(0, idx);
            let last = startNum;
            if (stack.length) { const [lr, lc] = stack[stack.length - 1]; last = assigned[lr][lc]; }
            current = nextComposite(last);
            updateHUD();
          }
          return;
        }

        if (current > maxVal) return;
        const prevPos = posOf[current - 1]; if (!prevPos) { tryShake(cell); return; }
        if (Math.abs(prevPos[0] - r) + Math.abs(prevPos[1] - c) !== 1) { tryShake(cell); return; }
        const nxt = current + 1;
        if (nxt <= maxVal && isPrime(nxt)) {
          const nxtPos = posOf[nxt];
          if (!(nxtPos && Math.abs(nxtPos[0] - r) + Math.abs(nxtPos[1] - c) === 1)) { tryShake(cell); return; }
        }

        filled[r][c] = true; assigned[r][c] = current; stack.push([r, c]); posOf[current] = [r, c];
        current = nextComposite(current);
        updateHUD();

        if (stack.length === totalComposites) {  // 完成一關 → 無縫接下一關
          levelCount++;
          newLevel();
        }
      });

      // ---- Overlay ----
      function showOverlay(html, extraClass = '') {
        overlayContent.className = 'modal' + (extraClass ? ' ' + extraClass : '');
        overlayContent.innerHTML = html;
        overlayEl.classList.add('show');
      }
      function hideOverlay() { overlayEl.classList.remove('show'); overlayContent.innerHTML = ''; }

      function showStart() {
        inputLocked = true;
        showOverlay(`
          <h2>急速模式</h2>
          <p>30 秒內盡量破關！<br>盤面 6×5、每關隨機起始，<br>依序點出 17 個合數即過關。</p>
          <div class="row"><button id="btnStart" class="wide">點擊開始</button></div>
        `, 'start');
        document.getElementById('btnStart').onclick = startRun;
      }

      // 重置挑戰：停掉計時、產生第一關（顯示於開始遮罩後方）、顯示開始遮罩
      function resetChallenge() {
        clearInterval(timerId); timerId = null;
        clearInterval(cdId); cdId = null;
        running = false; inputLocked = true;
        levelCount = 0;
        timeLeftEl.textContent = '30.0';
        timePill.classList.remove('low');
        statusEl.textContent = '';
        newLevel();
        showStart();
      }

      function startRun() {
        // 3 秒倒數（與基礎模式相同：遮罩大數字 3-2-1）
        inputLocked = true;
        let n = 3;
        showOverlay(`<div class="big" id="cdNum">${n}</div><p>準備囉…</p>`);
        clearInterval(cdId);
        cdId = setInterval(() => {
          n--;
          const el = document.getElementById('cdNum');
          if (n > 0) { if (el) el.textContent = String(n); }
          else {
            clearInterval(cdId); cdId = null;
            hideOverlay();
            beginTimer();
          }
        }, 1000);
      }

      function beginTimer() {
        inputLocked = false;
        running = true;
        deadline = performance.now() + TOTAL_MS;
        statusEl.textContent = '開始！';
        clearInterval(timerId);
        timerId = setInterval(() => {
          const remain = Math.max(0, deadline - performance.now());
          timeLeftEl.textContent = (remain / 1000).toFixed(1);
          timePill.classList.toggle('low', remain <= 5000);
          if (remain <= 0) endRun();
        }, 50);
      }

      function endRun() {
        clearInterval(timerId); timerId = null;
        running = false; inputLocked = true;
        timeLeftEl.textContent = '0.0';
        statusEl.textContent = '時間到！';

        const cellsFilled = levelCount * TARGET_COMPOSITES + stack.length;
        const avgLevel = levelCount > 0 ? (30 / levelCount).toFixed(2) + ' 秒' : '—';
        const avgCell = cellsFilled > 0 ? (30 / cellsFilled).toFixed(2) + ' 秒' : '—';

        showOverlay(`
          <h2>時間到！</h2>
          <p class="done-count">完成 ${levelCount} 關</p>
          <p class="stat">平均一關：<b>${avgLevel}</b></p>
          <p class="stat">平均一格：<b>${avgCell}</b></p>
          <div class="row">
            <button id="btnAgain">再挑戰一次</button>
            <button id="btnHome" class="secondary">返回首頁</button>
          </div>
        `);
        document.getElementById('btnAgain').onclick = resetChallenge;
        document.getElementById('btnHome').onclick = () => { location.href = 'index.html'; };
      }

      document.getElementById('gen').onclick = resetChallenge;
      document.getElementById('backHome').onclick = () => { location.href = 'index.html'; };

      // init
      resetChallenge();
    })();
  </script>
</body>

</html>
