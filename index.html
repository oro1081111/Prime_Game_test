<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>質數遊戲 - 首頁</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <style>
    :root {
      --ink:#172033;
      --muted:#667085;
      --paper:rgba(255,255,255,.88);
      --solid:#fffdf8;
      --line:#e5dccb;
      --brand:#ffbf48;
      --teal:#0f766e;
      --indigo:#4f46e5;
    }
    body {
      min-height:100vh;
      background:linear-gradient(180deg, #fff8e8 0%, #f5f1e9 48%, #edf7f2 100%);
      color:var(--ink);
      overflow-x:hidden;
    }
    .ambient-board {
      position:fixed;
      inset:auto -32px -36px auto;
      width:min(96vw, 620px);
      aspect-ratio:1;
      display:grid;
      grid-template-columns:repeat(10, 1fr);
      gap:5px;
      opacity:.34;
      transform:rotate(-8deg);
      pointer-events:none;
      z-index:0;
    }
    .ambient-board span {
      --cell-bg:rgba(255,255,255,.82);
      --cell-color:rgba(31,41,55,.4);
      --cell-border:#d8d0c0;
      position:relative;
      border:1px solid var(--cell-border);
      border-radius:6px;
      background:var(--cell-bg);
      display:grid;
      place-items:center;
      color:var(--cell-color);
      font-weight:900;
      font-size:clamp(9px, 1.5vw, 15px);
      box-shadow:0 1px 0 rgba(255,255,255,.64) inset;
      transition:background .22s, border-color .22s, box-shadow .22s, color .22s, transform .22s;
    }
    .ambient-board span.prime {
      --cell-bg:#f0e8ff;
      --cell-color:#4b2faf;
      --cell-border:#a78bfa;
      text-shadow:0 1px 0 rgba(255,255,255,.5);
    }
    .ambient-board span.one {
      --cell-bg:#fff0b3;
      --cell-color:#7a4d00;
      --cell-border:#e6b800;
    }
    .ambient-board span.filled {
      --cell-bg:#e8f7ff;
      --cell-color:#075985;
      --cell-border:#8bd3f7;
    }
    .ambient-board span.current {
      --cell-bg:#e6ffe9;
      --cell-color:#14532d;
      --cell-border:#22c55e;
      box-shadow:0 0 0 2px rgba(20,83,45,.42) inset, 0 8px 22px rgba(15,118,110,.28);
      transform:scale(1.03);
    }
    .wrap {
      max-width:1080px;
      min-height:calc(100vh - 32px);
      margin:0 auto;
      text-align:left;
      display:flex;
      flex-direction:column;
      gap:12px;
      position:relative;
      z-index:1;
    }
    .topbar {
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .brand {
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .brand-mark {
      width:34px;
      height:34px;
      border-radius:8px;

      place-items:center;

      color:var(--brand);
      font-weight:900;
      flex:0 0 auto;

    .brand-title {

    .brand-sub {

      .field {

      .panel-title {

      .account-badge {

      .free-card .mode-top {

    @media (max-width:380px) {
      h1 {

      }

      #authStatus {

      }

        padding:8px 8px;

      }
      .mode-card {
        padding:8px;
      }
      .name-row {
        grid-template-columns:1fr 74px;
      }
      #saveName {
        width:74px;
      }
    }
  </style>

<script>
(function(){
  const board = document.querySelector('.ambient-board');
  if (!board) return;
  const size = 10;
  const stepMs = 720;
  const resetPauseMs = 1800;
  let timer = null;

  function isPrime(value) {
    if (value < 2) return false;
    for (let d = 2; d * d <= value; d++) {
      if (value % d === 0) return false;
    }
    return true;
  }

  function initSnake(rows, cols) {
    const p = [];
    for (let r = 0; r < rows; r++) {
      if (r % 2 === 0) {
        for (let c = 0; c < cols; c++) p.push([r, c]);
      } else {
        for (let c = cols - 1; c >= 0; c--) p.push([r, c]);
      }
    }
    return p;
  }

  function backbite(p, rows, cols) {
    const n = p.length;
    if (n < 4) return false;
    const useHead = Math.random() < 0.5;
    const endpoint = useHead ? p[0] : p[n - 1];
    const index = new Map();
    for (let i = 0; i < n; i++) index.set(`${p[i][0]},${p[i][1]}`, i);
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    const candidates = [];
    for (const [dr, dc] of dirs) {
      const nr = endpoint[0] + dr;
      const nc = endpoint[1] + dc;
      if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
      const k = index.get(`${nr},${nc}`);
      if (k == null) continue;
      if (useHead ? k <= 1 : k >= n - 2) continue;
      candidates.push(k);
    }
    if (!candidates.length) return false;
    const k = candidates[(Math.random() * candidates.length) | 0];
    if (useHead) {
      const pre = p.slice(0, k).reverse();
      const rest = p.slice(k);
      p.splice(0, p.length, ...pre, ...rest);
    } else {
      const left = p.slice(0, k + 1);
      const tail = p.slice(k + 1).reverse();
      p.splice(0, p.length, ...left, ...tail);
    }
    return true;
  }

  const cells = [];
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      const cell = document.createElement('span');
      cell.dataset.r = String(r);
      cell.dataset.c = String(c);
      cells.push(cell);
      board.appendChild(cell);
    }
  }

  function createSpecialPath() {
    const path = initSnake(size, size);
    const turns = 18 * size * size;
    for (let i = 0; i < turns; i++) backbite(path, size, size);
    return path;
  }

  function setCellState(cell, state, value) {
    cell.className = '';
    if (state) cell.classList.add(state);
    cell.textContent = state === 'pending' ? '' : String(value);
  }

  function startDemo() {
    const path = createSpecialPath();
    const composites = [];
    cells.forEach((cell, i) => {
      const r = Math.floor(i / size);
      const c = i % size;
      const value = path.findIndex(([pr, pc]) => pr === r && pc === c) + 1;
      cell.dataset.value = String(value);
      if (value === 1) {
        setCellState(cell, 'one', value);
      } else if (isPrime(value)) {
        setCellState(cell, 'prime', value);
      } else {
        setCellState(cell, 'pending', value);
        composites.push(cell);
      }
    });

    composites.sort((a, b) => Number(a.dataset.value) - Number(b.dataset.value));
    let step = 0;
    const renderStep = () => {
      composites.forEach((cell, index) => {
        const value = Number(cell.dataset.value);
        if (index < step) setCellState(cell, 'filled', value);
        else if (index === step) setCellState(cell, 'current', value);
        else setCellState(cell, 'pending', value);
      });

      step++;
      if (step > composites.length) {
        clearInterval(timer);
        timer = setTimeout(startDemo, resetPauseMs);
      }
    };
    renderStep();
    timer = setInterval(renderStep, stepMs);
  }

  startDemo();
})();
</script>

<script>
(function(){
  const nameInput = document.getElementById('playerName');
  const saveBtn   = document.getElementById('saveName');
  const lbBtn     = document.getElementById('goLeaderboard');
  const aboutBtn  = document.getElementById('goAbout');
  const freeBtns  = [document.getElementById('goFree'), document.getElementById('goFreeCard')].filter(Boolean);

  const stored = (localStorage.getItem('playerName') || '').slice(0, 10);
  if (stored) nameInput.value = stored;

  saveBtn.onclick = ()=>{
    const v = nameInput.value.trim().slice(0, 10);
    nameInput.value = v;
    localStorage.setItem('playerName', v);
    alert('已儲存排行榜顯示名稱：' + (v || '(未命名)'));
  };

  function ensureName(){
    const v = nameInput.value.trim().slice(0, 10);
    if (!v){
      alert('請先設定排行榜顯示名稱。');
      nameInput.focus();
      return null;
    }
    nameInput.value = v;
    localStorage.setItem('playerName', v);
    return v;
  }

  async function ensureGoogleLogin(){
    const auth = window.PrimeAuth;
    if (!auth) {
      alert('登入系統尚未準備好，請稍後再試。');
      return false;
    }
    await auth.ready;
    if (auth.isGoogleSignedIn()) return true;
    try {
      await auth.signInWithGoogle();
      return auth.isGoogleSignedIn();
    } catch (e) {
      return false;
    }
  }

  document.querySelectorAll('button[data-mode]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const name = ensureName();
      if(!name) return;
      if (!(await ensureGoogleLogin())) return;

      const mode = btn.dataset.mode;
      const size = parseInt(btn.dataset.size,10);

      let start=1, hidden=0;
      if(mode==='hard'){ start=105; hidden=0; }
      if(mode==='hidden'){ start=1; hidden=1; }

      Router.go('play.html', { mode, size, name, start, hidden, hint:0, import:0 });
    });
  });

  freeBtns.forEach(btn => {
    btn.onclick = async ()=>{
      const name = ensureName();
      if(!name) return;
      if (!(await ensureGoogleLogin())) return;
      location.href = 'free.html';
    };
  });

  aboutBtn.onclick = ()=>{
    location.href = 'about.html';
  };

  lbBtn.onclick = ()=>{
    location.href = 'leaderboard.html';
  };
})();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signOut,
  onAuthStateChanged, setPersistence, browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAbd97s2tRaR_VJXrBXGlibhMlSTujSl5w",
  authDomain: "prime-game-58db3.firebaseapp.com",
  projectId: "prime-game-58db3",
  storageBucket: "prime-game-58db3.firebasestorage.app",
  messagingSenderId: "1056693585850",
  appId: "1:1056693585850:web:a17b5e82a12fa6525bff83"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const gp = new GoogleAuthProvider();
let currentUser = null;
let resolveAuthReady;
const authReady = new Promise(resolve => { resolveAuthReady = resolve; });
let authReadyResolved = false;

function markAuthReady() {
  if (!authReadyResolved) {
    authReadyResolved = true;
    resolveAuthReady();
  }
}

async function signInWithGoogle() {
  const result = await signInWithPopup(auth, gp);
  currentUser = result.user;
  updateAuthUI(currentUser);
  return currentUser;
}

window.PrimeAuth = {
  ready: authReady,
  isGoogleSignedIn: () => !!currentUser && !currentUser.isAnonymous,
  signInWithGoogle
};

function shortId(user) {
  if (!user?.uid) return '';
  return user.uid.slice(-4).toUpperCase();
}

function updateAuthUI(user) {
  const st = document.getElementById('authStatus');
  const badge = document.getElementById('accountBadge');
  const signinBtn = document.getElementById('btnGoogleSignIn');
  const signoutBtn = document.getElementById('btnSignOut');
  if (!st) return;
  if (!user || user.isAnonymous) {
    st.textContent = '登入後才能開始挑戰';
    if (badge) {
      badge.textContent = '尚未登入';
      badge.classList.remove('signed');
    }
    if (signinBtn) signinBtn.style.display = '';
    if (signoutBtn) signoutBtn.style.display = 'none';
  } else {
    const email = user.email || user.providerData[0]?.email || 'Google 帳號';
    st.textContent = email;
    if (badge) {
      badge.textContent = `玩家 #${shortId(user)}`;
      badge.classList.add('signed');
    }
    if (signinBtn) signinBtn.style.display = 'none';
    if (signoutBtn) signoutBtn.style.display = '';
  }
}

setPersistence(auth, browserLocalPersistence).catch(e => {
  console.error('登入保存設定失敗', e);
}).finally(() => {
  onAuthStateChanged(auth, user => {
    currentUser = user || null;
    updateAuthUI(currentUser);
    markAuthReady();
  });
});

document.getElementById('btnGoogleSignIn')?.addEventListener('click', async () => {
  try {
    await signInWithGoogle();
  } catch (e) {
    if (e.code !== 'auth/popup-closed-by-user') {
      console.error('Google 登入失敗', e);
    }
  }
});

document.getElementById('btnSignOut')?.addEventListener('click', async () => {
  await signOut(auth);
});
</script>
