<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>質數遊戲 - 首頁</title>
  <link rel="stylesheet" href="assets/css/base.css">
  <style>
    .btn {
      appearance:none;
      border:0;
      background:#ffbf48;
      color:#000;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
    }
    .btn.secondary {
      background:#fff;
      border:1px solid #e8dfc7;
    }
    .btn:disabled {
      opacity:.55;
      cursor:not-allowed;
    }
    .btn:active {
      transform:translateY(1px);
    }
    .controls-row {
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }
    #playerName {
      margin-left:8px;
    }
  </style>
</head>
<body>
<div class="wrap">
  <h1>漢米爾頓-質數遊戲</h1>
  <div class="row" style="font-size:14px;opacity:.8">
    奧羅桌遊設計工作室 - 程式實作練習
  </div>

  <div class="controls card">
    <div class="controls-row">
      <label>挑戰者名稱：
        <input id="playerName" type="text" placeholder="你的名字" maxlength="10">
      </label>
      <button id="saveName" class="secondary btn">儲存名稱</button>
      <!-- 遊戲介紹按鈕 -->
      <button id="goAbout" class="btn secondary">遊戲介紹</button>
      <!-- 新增排行榜按鈕，與儲存名稱並排 -->
      <button id="goLeaderboard" class="btn">查看排行榜</button>
    </div>
    <div class="controls-row" style="font-size:13px;gap:10px;opacity:.8;min-height:28px;">
      <span id="authStatus">連線中…</span>
      <button id="btnGoogleSignIn" class="btn secondary" style="display:none;font-size:13px;padding:4px 10px;">Google 登入</button>
      <button id="btnSignOut" class="btn secondary" style="display:none;font-size:13px;padding:4px 10px;">登出</button>
    </div>
  </div>

  <div class="card-grid">
    <div class="card">
      <h3>基本模式</h3>
      <div class="row">
        <button class="btn" data-mode="basic" data-size="5">5階</button>
        <button class="btn" data-mode="basic" data-size="7">7階</button>
        <button class="btn" data-mode="basic" data-size="10">10階</button>
      </div>
      <div class="row" style="font-size:14px;opacity:.8">
        從1開始，找到一條漢米爾頓路徑串連所有質數吧
      </div>
    </div>

    <div class="card">
      <h3>困難模式</h3>
      <div class="row">
        <button class="btn" data-mode="hard" data-size="5">5階</button>
        <button class="btn" data-mode="hard" data-size="7">7階</button>
        <button class="btn" data-mode="hard" data-size="10">10階</button>
      </div>
      <div class="row" style="font-size:14px;opacity:.8">
        數字從105開始，質數密度降低，增加遊戲難度
      </div>
    </div>

    <div class="card">
      <h3>隱藏模式</h3>
      <div class="row">
        <button class="btn" data-mode="hidden" data-size="5">5階</button>
        <button class="btn" data-mode="hidden" data-size="7">7階</button>
        <button class="btn" data-mode="hidden" data-size="10">10階</button>
      </div>
      <div class="row" style="font-size:14px;opacity:.8">
        只顯示質數位置，不顯示數字，挑戰你的直覺與邏輯力
      </div>
    </div>

    <div class="card">
      <h3>自由模式</h3>
      <div class="row">
        <button class="btn" id="goFree">進入自由模式</button>
      </div>
      <div class="row" style="font-size:14px;opacity:.8">
        可自訂起始數字 / 隱藏模式 / 提示 / 匯入匯出 / PNG
      </div>
    </div>
  </div>

  <footer>© 奧羅桌遊設計工作室 - Prime Game</footer>
</div>

<script src="assets/js/router.js"></script>
<script>
(function(){
  const nameInput = document.getElementById('playerName');
  const saveBtn   = document.getElementById('saveName');
  const lbBtn     = document.getElementById('goLeaderboard');
  const aboutBtn  = document.getElementById('goAbout');

  const stored = (localStorage.getItem('playerName') || '').slice(0, 10);
  if (stored) nameInput.value = stored;

  // 儲存名稱
  saveBtn.onclick = ()=>{
    const v = nameInput.value.trim();
    localStorage.setItem('playerName', v);
    alert('已儲存挑戰者名稱：' + (v || '(未命名)'));
  };

  // 共用：檢查名稱是否已輸入（最多 10 字，與 Firestore 規則一致）
  function ensureName(){
    const v = nameInput.value.trim().slice(0, 10);
    if (!v){
      alert('請先輸入挑戰者名稱！');
      nameInput.focus();
      return null;
    }
    nameInput.value = v; // 同步截斷後的值回 input
    localStorage.setItem('playerName', v);
    return v;
  }

  async function ensureGoogleLogin(){
    const auth = window.PrimeAuth;
    if (!auth) {
      alert('登入系統尚未準備好，請稍後再試。');
      return false;
    }
    await auth.ready;
    if (auth.isGoogleSignedIn()) return true;
    try {
      await auth.signInWithGoogle();
      return auth.isGoogleSignedIn();
    } catch (e) {
      return false;
    }
  }

  // 模式按鈕 → 導向 play.html
  document.querySelectorAll('button[data-mode]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const name = ensureName();
      if(!name) return;
      if (!(await ensureGoogleLogin())) return;

      const mode = btn.dataset.mode;
      const size = parseInt(btn.dataset.size,10);

      let start=1, hidden=0;
      if(mode==='hard'){ start=105; hidden=0; }
      if(mode==='hidden'){ start=1; hidden=1; }

      Router.go('play.html', { mode, size, name, start, hidden, hint:0, import:0 });
    });
  });

  // 自由模式
  document.getElementById('goFree').onclick = async ()=>{
    const name = ensureName();
    if(!name) return;
    if (!(await ensureGoogleLogin())) return;
    location.href = 'free.html';
  };

  // 遊戲介紹（不需先輸入名稱）
  aboutBtn.onclick = ()=>{
    location.href = 'about.html';
  };

  // 查看排行榜
  lbBtn.onclick = ()=>{
    const name = ensureName();
    if(!name) return;
    location.href = 'leaderboard.html';
  };
})();
</script>

<!-- Firebase 身份驗證（匿名 + Google 一鍵登入） -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signOut,
  onAuthStateChanged, setPersistence, browserLocalPersistence
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAbd97s2tRaR_VJXrBXGlibhMlSTujSl5w",
  authDomain: "prime-game-58db3.firebaseapp.com",
  projectId: "prime-game-58db3",
  storageBucket: "prime-game-58db3.firebasestorage.app",
  messagingSenderId: "1056693585850",
  appId: "1:1056693585850:web:a17b5e82a12fa6525bff83"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const gp = new GoogleAuthProvider();
let currentUser = null;
let resolveAuthReady;
const authReady = new Promise(resolve => { resolveAuthReady = resolve; });
let authReadyResolved = false;

function markAuthReady() {
  if (!authReadyResolved) {
    authReadyResolved = true;
    resolveAuthReady();
  }
}

async function signInWithGoogle() {
  const result = await signInWithPopup(auth, gp);
  currentUser = result.user;
  updateAuthUI(currentUser);
  return currentUser;
}

window.PrimeAuth = {
  ready: authReady,
  isGoogleSignedIn: () => !!currentUser && !currentUser.isAnonymous,
  signInWithGoogle
};

function updateAuthUI(user) {
  const st = document.getElementById('authStatus');
  const signinBtn = document.getElementById('btnGoogleSignIn');
  const signoutBtn = document.getElementById('btnSignOut');
  if (!st) return;
  if (!user || user.isAnonymous) {
    st.textContent = '尚未登入';
    if (signinBtn) signinBtn.style.display = '';
    if (signoutBtn) signoutBtn.style.display = 'none';
  } else {
    const email = user.email || user.providerData[0]?.email || 'Google 帳號';
    st.textContent = email;
    if (signinBtn) signinBtn.style.display = 'none';
    if (signoutBtn) signoutBtn.style.display = '';
  }
}

setPersistence(auth, browserLocalPersistence).catch(e => {
  console.error('登入保存設定失敗', e);
}).finally(() => {
  onAuthStateChanged(auth, user => {
    currentUser = user || null;
    updateAuthUI(currentUser);
    markAuthReady();
  });
});

document.getElementById('btnGoogleSignIn')?.addEventListener('click', async () => {
  try {
    await signInWithGoogle();
  } catch (e) {
    if (e.code !== 'auth/popup-closed-by-user') {
      console.error('Google 登入失敗', e);
    }
  }
});

document.getElementById('btnSignOut')?.addEventListener('click', async () => {
  await signOut(auth);
});
</script>
</body>
</html>
